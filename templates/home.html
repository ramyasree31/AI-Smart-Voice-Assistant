<!-- <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="origin" />
    <title>Smart Voice Assistant</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, sans-serif;
      }

      body {
        background: #0d0718;
        color: white;
        min-height: 100vh;
        width: 100vw;
        overflow-x: hidden;
      }

      .dashboard {
        display: flex;
        height: 100vh;
        width: 100%;
        max-width: 100vw;
        overflow: hidden;
        background: radial-gradient(circle at top left, #5f2cff, #0d0718);
      }

      .sidebar {
        width: 100px;
        background: #12072c;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }

      .profile {
        text-align: center;
      }

      .profile img {
        width: 60px;
        border-radius: 50%;
      }

      .profile h3 {
        margin-top: 10px;
        font-size: 14px;
      }

      .nav {
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .nav button {
        width: 50px;
        height: 50px;
        border: none;
        border-radius: 15px;
        background: #211040;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }

      .main {
        flex: 1;
        padding: 20px;
        width: 100%;
        height: 100%;

        display: grid;
        gap: 10px;

        /* desktop layout */
        grid-template-columns: 360px minmax(420px, 1fr) 280px;
        grid-template-rows: 1fr 1fr;

        grid-template-areas:
          "left assistant calendar"
          "left assistant todo";
      }

      .assistant-panel,
      .calendar,
      .todo {
        min-height: 0;
      }

      .left-panel {
        grid-area: left;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }

      .left-panel > * {
        min-height: 0;
      }

      .voice-chat-card {
        grid-area: left;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.14);
        backdrop-filter: blur(20px);
        border-radius: 25px;
        padding: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        overflow: hidden;
      }

      .voice-chat-card .voice-card {
        background: linear-gradient(135deg, #7b2ff7, #31cfff);
        border-radius: 0;
        border-top-left-radius: 25px;
        border-top-right-radius: 25px;
        margin: 0;
        padding: 25px;
        flex: 0 0 33%;
        min-height: 0;
      }

      .voice-chat-card .chat-panel {
        background: rgba(255, 255, 255, 0.06);
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        border-bottom-left-radius: 25px;
        border-bottom-right-radius: 25px;
        border-radius: 0 0 25px 25px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1 1 67%;
        overflow: hidden;
      }

      .chat-panel-view {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .chat-panel .chat-box {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* ======================
   VOICE CARD
====================== */

      .voice-card {
        grid-area: voice;

        background: linear-gradient(135deg, #7b2ff7, #31cfff);

        border-radius: 25px;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        padding: 25px;
      }

      .mic {
        width: 130px;
        height: 130px;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.2);

        backdrop-filter: blur(10px);

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 50px;
      }

      .wave-container {
        display: flex;
        gap: 6px;
        align-items: flex-end;
        height: 80px;
        margin: 20px 0;
      }

      .wave-container span {
        width: 8px;
        background: white;
        border-radius: 20px;
        animation: wave 1s infinite ease-in-out;
      }

      .wave-container span:nth-child(1) {
        animation-delay: 0.1s;
      }
      .wave-container span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .wave-container span:nth-child(3) {
        animation-delay: 0.3s;
      }
      .wave-container span:nth-child(4) {
        animation-delay: 0.4s;
      }
      .wave-container span:nth-child(5) {
        animation-delay: 0.5s;
      }
      .wave-container span:nth-child(6) {
        animation-delay: 0.6s;
      }
      .wave-container span:nth-child(7) {
        animation-delay: 0.7s;
      }

      @keyframes wave {
        0%,
        100% {
          height: 10px;
        }

        50% {
          height: 45px;
        }
      }

      #voiceStatus {
        margin-bottom: 10px;
        cursor: pointer;
      }

      #voiceSubText {
        opacity: 0.8;
      }

      /* ======================
   ASSISTANT PANEL
====================== */

      .assistant-panel {
        grid-area: assistant;

        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);

        backdrop-filter: blur(20px);

        border-radius: 25px;

        padding: 25px;

        display: flex;
        flex-direction: column;
      }

      .chat-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
      }

      .history-button {
        border: none;
        border-radius: 12px;
        background: rgba(123, 47, 247, 0.95);
        color: white;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }

      .history-button:hover {
        transform: translateY(-1px);
        background: rgba(123, 47, 247, 1);
      }

      .hidden {
        display: none;
      }

      .history-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .ai-msg {
        align-self: flex-start;

        background: #1d1b31;

        padding: 15px;

        border-radius: 15px;

        max-width: 75%;
      }

      .user-msg {
        align-self: flex-end;

        background: #7b2ff7;

        padding: 15px;

        border-radius: 15px;

        max-width: 75%;
      }

      .typing {
        align-self: flex-start;
        background: #1d1b31;
        padding: 15px;
        border-radius: 15px;
      }

      .input-row {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .input-row input {
        flex: 1;
        border: none;
        outline: none;
        padding: 15px;
        border-radius: 12px;
      }

      .input-row button {
        border: none;
        background: #7b2ff7;
        color: white;
        border-radius: 12px;
        padding: 15px 25px;
        cursor: pointer;
      }

      /* ======================
   ASSISTANT HOME
====================== */
      .assistant-home {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .welcome-text {
        margin-top: 15px;
        color: #cfcfcf;
        max-width: 700px;
      }

      .context-grid {
        margin-top: 40px;

        display: grid;

        grid-template-columns: repeat(3, 1fr);

        gap: 20px;

        width: 100%;
      }

      .context-card {
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.16);

        border-radius: 18px;

        padding: 20px;

        cursor: pointer;

        transition: transform 0.3s ease, background 0.3s ease;
      }

      .context-card:hover {
        transform: translateY(-5px);

        background: rgba(255, 255, 255, 0.18);
      }

      .context-card h4 {
        margin-bottom: 10px;
      }

      /* ======================
   CALENDAR
====================== */

      .calendar {
        grid-area: calendar;

        background: #f5c98f;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.14);

        color: #111;

        border-radius: 25px;

        padding: 20px;
      }

      .calendar h1 {
        font-size: 90px;
      }

      /* ======================
   RECENT
====================== */

      .recent {
        display: flex;
        flex-direction: column;
        grid-area: recent;

        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.14);

        border-radius: 25px;

        padding: 20px;
      }

      .recent .chat-box {
        flex: 1;

        overflow-y: auto;

        margin-top: 15px;

        display: flex;
        flex-direction: column;

        gap: 10px;
      }

      .chat-item {
        margin-top: 12px;

        padding: 12px;

        border-radius: 12px;

        background: rgba(255, 255, 255, 0.05);
      }

      /* ======================
   TODO
====================== */

      .todo {
        grid-area: todo;

        background: #12072c;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.14);

        border-radius: 25px;

        padding: 20px;
      }

      .todo ul {
        list-style: none;
        margin-top: 15px;
      }

      .todo li {
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
      }

      @media (max-width: 1100px) {
        .main {
          grid-template-columns: 1fr;

          grid-template-areas:
            "left"
            "assistant"
            "calendar"
            "todo";
        }
      }

      /* center layout on large screens */
      @media (min-width: 1400px) {
        .dashboard {
          max-width: 1400px;
          margin: 0 auto;
        }
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <div class="sidebar">
        <div class="profile">
          <img src="https://ui-avatars.com/api/?name=R" />
          <h3>Ramyasree</h3>
        </div>

        <div class="nav">
          <button>🏠</button>
          <button>🎤</button>
          <button>💬</button>
          <button>⚙️</button>
        </div>
      </div>

      <div class="main">
        <div class="left-panel">
          <div class="voice-chat-card">
            <div class="voice-card">
              <div class="mic">🎤</div>

              <div class="wave-container">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>

              <h2 id="voiceStatus">Click to speak</h2>

              <p id="voiceSubText">Speak naturally</p>
            </div>

            <div class="chat-panel">
              <div class="chat-panel-header">
                <h3>Conversation</h3>
                <button id="historyToggle" class="history-button" type="button">🕘 History</button>
              </div>

              <div class="chat-panel-view" id="conversationView">

                  <div class="ai-msg">Hello Ramyasree! How can I help you today?</div>
                </div>

                <div class="input-row">
                  <input
                    id="messageInput"
                    type="text"
                    placeholder="Ask anything..."
                  />

                  <button onclick="sendMessage()">Send</button>
                </div>
              </div>

              <div class="chat-panel-view hidden" id="historyView">
                <div class="history-list" id="historyList">
                  <div class="chat-item">AI: Hello Ramyasree! How can I help you today?</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="assistant-panel">
          <div class="assistant-home">
            <h1>Hello, this is an AI Assistant!</h1>

            <p class="welcome-text">
              I will help you find answers to your questions or support a
              conversation on any topic.
            </p>

            <div class="context-grid">
              <div class="context-card">
                <h4>Songs</h4>
                <p>Plays audio files</p>
              </div>

              <div class="context-card">
                <h4>Reminders</h4>
                <p>Sets alarms and reminders</p>
              </div>

              <div class="context-card">
                <h4>Weather</h4>
                <p>Get current weather information</p>
              </div>

              <div class="context-card">
                <h4>movie recommendations</h4>
                <p>Get personalized movie suggestions</p>
              </div>

              <div class="context-card">
                <h4>🏠 Home</h4>
                <p>Home improvement ideas</p>
              </div>

              <div class="context-card">
                <h4>🎮 Games</h4>
                <p>Gaming recommendations</p>

          </div>

          <div
            class="youtube-player"
            id="youtubePlayerContainer"
            style="display: none; margin-top: 20px"
          >
            <audio
              id="audioPlayer"
              style="display: none; width: 100%; margin-bottom: 10px"
              controls
            ></audio>
            <iframe
              id="youtubePlayer"
              width="100%"
              height="250"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              referrerpolicy="origin"
              allowfullscreen
            ></iframe>
            <a
              id="youtubePlayLink"
              href="#"
              target="_blank"
              class="button"
              style="display: none; margin-top: 10px; text-decoration: none;"
            >
              Open on YouTube
            </a>
          </div>
        </div>

        <div class="calendar">
          <h3>Calendar</h3>

          <h1>10</h1>

          <p>June 2026</p>
        </div>

        <div class="calendar">
          <h3>Calendar</h3>

          <h1>10</h1>

          <p>June 2026</p>
        </div>

        <div class="todo">
          <h3>📋 Todo List</h3>

          <ul>
            <li>✅ Complete Voice Assistant UI</li>
            <li>🔄 Connect Ollama Backend</li>
            <li>🎤 Add Speech Recognition</li>
            <li>📅 Reminder System</li>
          </ul>

    <script>
      const chatBox = document.getElementById("chatBox");
      const voiceStatus = document.getElementById("voiceStatus");
      const voiceSubText = document.getElementById("voiceSubText");
      const micEl = document.querySelector(".mic");
      const youtubePlayer = document.getElementById("youtubePlayer");
      const audioPlayer = document.getElementById("audioPlayer");
      const youtubeContainer = document.getElementById(
        "youtubePlayerContainer",
      );
      const youtubePlayLink = document.getElementById("youtubePlayLink");
      const speechSupported = "speechSynthesis" in window;
      const historyToggle = document.getElementById("historyToggle");
      const conversationView = document.getElementById("conversationView");
      const historyView = document.getElementById("historyView");
      const historyList = document.getElementById("historyList");

      function setHistoryMode(showHistory) {
        if (showHistory) {
          conversationView.classList.add("hidden");
          historyView.classList.remove("hidden");
          historyToggle.textContent = "💬 Conversation";
        } else {
          conversationView.classList.remove("hidden");
          historyView.classList.add("hidden");
          historyToggle.textContent = "🕘 History";
        }
      }

      historyToggle.addEventListener("click", () => {
        setHistoryMode(historyView.classList.contains("hidden"));
      });

      function addHistoryEntry(prefix, text) {
        const item = document.createElement("div");
        item.className = "chat-item";
        item.innerText = `${prefix}: ${text}`;
        historyList.appendChild(item);
      }

      function addUserMessage(text) {
        addHistoryEntry("You", text);
        const div = document.createElement("div");
        div.className = "user-msg";
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function addAIMessage(text) {
        addHistoryEntry("AI", text);
        const div = document.createElement("div");
        div.className = "ai-msg";
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        speakText(text);
      }

      function speakText(text) {
        if (!speechSupported || !text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
      }

      async function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;
        addUserMessage(text);
        input.value = "";
        await sendTextToBackend(text);
      }

      async function sendTextToBackend(text) {
        const typing = document.createElement("div");
        typing.className = "typing";
        typing.id = "typing";
        typing.innerHTML = "Thinking...";
        chatBox.appendChild(typing);

        try {
          const response = await fetch("/voice", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ command: text }),
          });

          const data = await response.json();
          document.getElementById("typing").remove();
          addAIMessage(data.response);
          if (data.action && data.action.startsWith("play_music")) {
            addAIMessage(data.response);
            showMusicPlayer(data.url, data.source, data.metadata);
          }
        } catch (err) {
          if (document.getElementById("typing"))
            document.getElementById("typing").remove();
          addAIMessage("Unable to connect.");
        }
      }

      function showMusicPlayer(url, source, metadata = {}) {
        if (!url) return;
        youtubeContainer.style.display = "block";
        
        // Check if we have an audio URL from yt-dlp
        const audioUrl = metadata?.audio_url;
        const isAudioStream = metadata?.is_audio_stream;
        
        if (source === "spotify") {
          audioPlayer.style.display = "none";
          youtubePlayer.style.display = "none";
          youtubePlayLink.href = url;
          youtubePlayLink.textContent = "Open in Spotify";
          youtubePlayLink.target = "_blank";
          youtubePlayLink.style.display = "inline-block";
        } else if (audioUrl && isAudioStream) {
          // Use HTML5 audio player for direct audio stream
          console.log("Audio stream:", audioUrl);
          audioPlayer.src = audioUrl;
          audioPlayer.style.display = "block";
          
          // Add event listeners for debugging
          audioPlayer.addEventListener("loadstart", () => console.log("loadstart"));
          audioPlayer.addEventListener("progress", () => console.log("progress", audioPlayer.buffered.length));
          audioPlayer.addEventListener("canplay", () => console.log("canplay"));
          audioPlayer.addEventListener("play", () => console.log("play"));
          audioPlayer.addEventListener("error", (e) => console.error("Audio error:", audioPlayer.error, e));
          
          audioPlayer.load();
          audioPlayer.play().catch(e => console.error("Play error:", e));
          youtubePlayer.style.display = "none";
          youtubePlayLink.href = url;
          youtubePlayLink.textContent = "Open on YouTube";
          youtubePlayLink.target = "_blank";
          youtubePlayLink.style.display = "inline-block";
        } else {
          // Try to embed YouTube video
          audioPlayer.style.display = "none";
          let embedUrl = url;
          let videoId = null;
          
          if (url.includes("youtube.com/watch?v=")) {
            videoId = url.split("v=")[1].split("&")[0];
            embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
          } else if (url.includes("youtu.be/")) {
            videoId = url.split("youtu.be/")[1].split("?")[0];
            embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
          } else if (url.includes("youtube.com/embed/")) {
            embedUrl = url.includes("autoplay=1") ? url : url + "?autoplay=1";
          }
          
          // If we have an embed URL, show the player
          if (embedUrl && embedUrl.includes("embed/")) {
            youtubePlayer.style.display = "block";
            youtubePlayer.src = embedUrl;
            youtubePlayLink.href = url;
            youtubePlayLink.textContent = source === "youtube_music" ? "Open in YouTube Music" : "Open on YouTube";
            youtubePlayLink.target = "_blank";
            youtubePlayLink.style.display = "inline-block";
          } else {
            // Fallback to link only
            youtubePlayer.style.display = "none";
            youtubePlayLink.href = url;
            youtubePlayLink.textContent = "Open on YouTube";
            youtubePlayLink.target = "_blank";
            youtubePlayLink.style.display = "inline-block";
          }
        }
      }

      // Enter key sends message
      document
        .getElementById("messageInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") sendMessage();
        });

      // --- Speech Recognition (Web Speech API) ---
      let recognition;
      let recognizing = false;
      let autoListeningEnabled = true;
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      let lastTranscript = "";
      let lastTranscriptTime = 0;

      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          recognizing = true;
          voiceStatus.innerText = "Always listening";
          voiceSubText.innerText = "Speak naturally";
          micEl.style.background = "rgba(255,255,255,0.25)";
        };

        recognition.onend = () => {
          recognizing = false;
          micEl.style.background = "rgba(255,255,255,0.2)";
          if (autoListeningEnabled) {
            try {
              recognition.start();
            } catch (e) {
              console.warn(e);
            }
          } else {
            voiceStatus.innerText = "Listening paused";
            voiceSubText.innerText = "Click mic to resume";
          }
        };

        recognition.onresult = (event) => {
          const transcript = event.results[event.resultIndex][0].transcript.trim();
          const now = Date.now();
          if (transcript && transcript === lastTranscript && now - lastTranscriptTime < 3000) {
            return;
          }
          lastTranscript = transcript;
          lastTranscriptTime = now;
          addUserMessage(transcript);
          sendTextToBackend(transcript);
        };

        recognition.onerror = (e) => {
          console.error("Speech recognition error", e);
          if (autoListeningEnabled) {
            try {
              recognition.start();
            } catch (err) {
              console.warn(err);
            }
          }
        };
      } else {
        // not supported
        voiceStatus.innerText = "Speech recognition not supported";
        voiceSubText.style.opacity = 0.7;
      }

      function ensureRecognitionRunning() {
        if (!recognition || !autoListeningEnabled || recognizing) return;
        try {
          recognition.start();
        } catch (e) {
          console.warn(e);
        }
      }

      function toggleRecognition() {
        if (!recognition) {
          addAIMessage("Speech Recognition not supported in this browser.");
          return;
        }

        autoListeningEnabled = !autoListeningEnabled;
        if (!autoListeningEnabled) {
          if (recognizing) {
            recognition.stop();
          }
          voiceStatus.innerText = "Listening paused";
          voiceSubText.innerText = "Click mic to resume";
          micEl.style.background = "rgba(255,255,255,0.2)";
          return;
        }

        ensureRecognitionRunning();
      }

      // attach click to mic and voiceStatus
