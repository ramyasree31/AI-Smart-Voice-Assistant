<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Smart Voice Assistant</title>
    <style>
      body { margin:0; min-height:100vh; font-family:Inter,sans-serif; background:#0d0718; color:#fff; }
      .page { max-width:760px; margin:0 auto; padding:24px; }
      .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:24px; }
      .topbar button { border:none; border-radius:14px; padding:10px 16px; background:#7b2ff7; color:#fff; cursor:pointer; }
      .panel { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:24px; padding:24px; }
      .section { margin-bottom:24px; }
      .section h2 { margin-bottom:14px; font-size:20px; }
      .section p { color:#c4c4c4; line-height:1.6; }
      .setting-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.08); }
      .setting-row:last-child { border-bottom:none; }
      .setting-row button { border:none; border-radius:14px; padding:10px 14px; background:#31cfff; color:#000; cursor:pointer; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <button type="button" onclick="window.location.href='/'">← Back</button>
        <h1>Settings</h1>
      </div>
      <div class="panel">
        <div class="section">
          <h2>Account</h2>
          <div class="setting-row">
            <div>
              <strong>Profile</strong>
              <p>Manage your login account and application preferences.</p>
            </div>
            <button onclick="window.location.href='/login'">Login</button>
          </div>
        </div>
        <div class="section">
          <h2>App</h2>
          <div class="setting-row">
            <div>
              <strong>Notifications</strong>
              <p>Enable or disable reminders and voice alerts.</p>
            </div>
            <button onclick="alert('No settings available yet')">Toggle</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
